spring:
  application:
    name: cad-ribeirao-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cad_ribeirao?useTimezone=true&serverTimezone=UTC
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:admin123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# CORS — injetado via @Value no FiltroTokenAcesso
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allow-headers: authtoken, refreshtoken, Content-Type
  allow-methods: GET, POST, PUT, DELETE, OPTIONS

jwt:
  secret: ${JWT_SECRET:dev-secret-trocar-em-producao}
  expiration: 3600000
  refresh-expiration: 604800000

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.type.descriptor.jdbc: trace
