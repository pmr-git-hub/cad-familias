services:
  mysql:
    image: mysql:8.0
    container_name: cad-familias-db
    environment:
      MYSQL_DATABASE: cad_familias
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
      MYSQL_ROOT_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
